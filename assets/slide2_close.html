<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1280px; height:720px; overflow:hidden; }
  body { font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
         background:radial-gradient(circle at 70% 20%, #16263a 0%, #0a0e14 60%, #06080c 100%);
         color:#e6edf3; padding:72px 84px; display:flex; flex-direction:column;
         justify-content:center; height:720px; text-align:center; align-items:center; }
  h1 { font-size:84px; font-weight:800; letter-spacing:-2px; line-height:1; }
  h1 .ev { color:#ff5d5d; }
  .repo { margin-top:18px; font-family:'SF Mono',Menlo,Consolas,monospace; font-size:22px; color:#58a6ff; }
  .repo .dot { color:#6e7b8a; }
  .stats { display:flex; gap:14px; margin-top:40px; flex-wrap:wrap; justify-content:center; max-width:1040px; }
  .chip { background:rgba(255,255,255,0.04); border:1px solid #243244; border-radius:999px;
          padding:11px 20px; font-size:18px; color:#e6edf3; }
  .chip b { color:#3fb950; }
  .chip.b b { color:#58a6ff; } .chip.y b { color:#e3b341; }
  .foot { margin-top:46px; color:#8b949e; font-size:17px; letter-spacing:2px; text-transform:uppercase; }
</style></head>
<body>
  <h1>Find&nbsp;<span class="ev">Evil!</span></h1>
  <div class="repo">github.com/manojmallick/find-evil <span class="dot">·</span> Apache 2.0</div>

  <div class="stats">
    <div class="chip"><b>0%</b> hallucination (CONFIRMED tier)</div>
    <div class="chip b"><b>Full</b> audit trail</div>
    <div class="chip y"><b>Self-correcting</b></div>
  </div>
  <div class="stats">
    <div class="chip b"><b>10</b> typed forensic tools</div>
    <div class="chip"><b>56</b> tests passing</div>
    <div class="chip"><b>12/12</b> bypasses blocked</div>
  </div>

  <div class="foot">SANS Find Evil! Hackathon 2026</div>
</body></html>
